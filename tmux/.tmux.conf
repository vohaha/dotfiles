# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color
set -ga terminal-overrides ",*:kLFT5=\eOD,*:kRIT5=\eOC"  # Ctrl+Left/Right
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                   # panes start at 1
set -g renumber-windows on                  # close a window → renumber
set -g history-limit 50000
set -g escape-time 0                        # no delay after Escape (vital for vim)
set -g focus-events on                      # pass focus events to apps
set -g mouse on

# ── Reload ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ───────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vim keys) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left " #[bold]#S#[nobold] "
set -g status-left-length 20

set -g status-right " #[fg=#565f89]%H:%M  %d %b "
set -g status-right-length 30

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[nobold] "
setw -g window-status-current-style "fg=#7aa2f7,bg=#292e42"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
