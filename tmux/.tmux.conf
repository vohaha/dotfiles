# ── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-b
bind C-b send-prefix

# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color
set -ga terminal-overrides ",*:kLFT5=\eOD,*:kRIT5=\eOC"  # Ctrl+Left/Right
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                   # panes start at 1
set -g renumber-windows on                  # close a window → renumber
set -g history-limit 50000
set -g escape-time 0                        # no delay after Escape (vital for vim)
set -g focus-events on                      # pass focus events to apps
set -g mouse on

# ── Reload ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Cheatsheet ────────────────────────────────────────────────────────────────
bind / display-popup -E -w 36 -h 17 "printf '\
\n\
  Splits\n\
    |   vertical\n\
    -   horizontal\n\
\n\
  Panes\n\
    h j k l   navigate\n\
    H J K L   resize\n\
    z         zoom toggle\n\
    space     cycle layouts\n\
    ctrl+d    close\n\
\n\
  Move panes\n\
    !         break → new window\n\
    @         pull pane from window\n\
\n\
  Windows\n\
    ctrl/cmd+1…9  switch\n\
'; read -r"

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane ↔ window ─────────────────────────────────────────────────────────────
# ! is built-in: break pane → new window
bind @ command-prompt -p "Pull pane from window:" "join-pane -s ':%%'"

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ───────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation (ctrl+number, no prefix) ───────────────────────────────
# Alacritty remaps ctrl+N → ESC+N; tmux binds M-N at root table (before panes see it)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Copy mode (vim keys) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g set-clipboard on
set -g status-position top
set -g status-justify left

set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left " #[bold]#S#[nobold] "
set -g status-left-length 20

set -g status-right " #[fg=#565f89]%H:%M  %d %b "
set -g status-right-length 30

setw -g window-status-format " #{b:pane_current_path}#{?window_zoomed_flag, ⬡,}#{?#{>:#{window_panes},1}, ·#{window_panes},} "
setw -g window-status-current-format " #[bold]#{b:pane_current_path}#{?window_zoomed_flag, ⬡,}#{?#{>:#{window_panes},1}, ·#{window_panes},}#[nobold] "
setw -g window-status-current-style "fg=#7aa2f7,bg=#292e42"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
