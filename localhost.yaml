---
- hosts: localhost
  tasks:
    - name: Install Linux prerequisites
      ansible.builtin.apt:
        name:
          - build-essential
          - curl
          - file
          - git
          - procps
        state: present
      become: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Install Homebrew packages
      homebrew:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - htop
        - fzf
        - ripgrep
        - luarocks
        - fd
        - lazygit
        - stow
        - tmux

    - name: Install fnm
      ansible.builtin.shell: >
        curl -fsSL https://fnm.vercel.app/install | bash
      args:
        creates: "{{ ansible_env.HOME }}/.fnm/fnm"
