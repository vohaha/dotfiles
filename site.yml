---
- name: Bootstrap dotfiles
  hosts: localhost
  connection: local
  gather_facts: true

  roles:
    - packages
    - role: bitwarden-desktop
      when: ansible_facts['system'] == 'Linux'
    - role: localsend-desktop
      when: ansible_facts['system'] == 'Linux'
    - role: ai-clis
      tags: [ai-clis]
    - role: macos-defaults
      when: ansible_facts['system'] == 'Darwin'
    - stow
    - hooks
    - role: nextdns
      tags: [nextdns]
      when:
        - ansible_facts['env'].NEXTDNS_PROFILE is defined
        - ansible_facts['env'].NEXTDNS_PROFILE | length > 0
