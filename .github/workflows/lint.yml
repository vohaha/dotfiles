---
name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y shellcheck
      - name: Run shellcheck
        run: shellcheck bootstrap.sh scripts/*.sh scripts/hooks/*

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install yamllint
        run: pip install --quiet yamllint
      - name: Run yamllint
        run: yamllint site.yml roles/ .ansible-lint .yamllint

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install ansible-lint
        run: pip install --quiet ansible-lint
      - name: Run ansible-lint
        run: ansible-lint --offline
