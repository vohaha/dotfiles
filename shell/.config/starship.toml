add_newline = true

format = """
$directory$git_branch$git_status$nodejs$golang$python$rust$cmd_duration
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"
style = "bold red"

[nodejs]
symbol = " "
detect_files = ["package.json", ".nvmrc", ".node-version"]

[golang]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
